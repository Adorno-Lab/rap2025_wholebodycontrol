services:
  ros_jazzy_vicon:
    build: https://github.com/Adorno-Lab/docker_recipes.git#main:ubuntu_24/ros_jazzy_vicon
    environment:
      DISPLAY: $DISPLAY # x server related
    privileged: true # Needed for some gpu configurations.
    volumes:
      #- repo-data:/root/sas_tutorial_workspace/src/sas_ur_control_template/
      - /tmp/.X11-unix:/tmp/.X11-unix # x server related
      - ~/.Xauthority:/root/.Xauthority # x server related
    network_mode: "host" # x server related
    ipc: "host"
    command: /bin/bash -c "
      source /opt/ros/jazzy/setup.bash;
      cd ~/ros2_ws/ && colcon build;
      source ~/ros2_ws/install/setup.bash ;
      export ROS_DOMAIN_ID=77;
      ros2 launch motion_capture_tracking launch.py"

  coppeliasim:
    image: murilomarinho/coppeliasim:noble_470rev4
    stop_signal: SIGINT
    platform: linux/amd64
    environment:
      DISPLAY: $DISPLAY # x server related
      ROS_DOMAIN_ID: 77
    privileged: true # Needed for some gpu configurations.
    volumes:
      - ../../coppeliasim_scenes:/app/coppeliasim_scenes
      - /tmp/.X11-unix:/tmp/.X11-unix # x server related
      - ~/.Xauthority:/root/.Xauthority # x server related
    network_mode: "host" # x server related
    ipc: "host"
    command: /bin/bash -c "
      sleep 3;
      cd "$$COPPELIASIM_PATH"
      && ./coppeliaSim.sh -s0 /app/coppeliasim_scenes/B1_with_Z1_showcase.ttt"    


  sas_coppeliasim_unitree_b1z1: ####
    build:
      context: ../..  
      dockerfile: docker/sas_unitree_b1z1_rap_control_template/Dockerfile
    environment:
      DISPLAY: $DISPLAY  # x server related
      ROS_DOMAIN_ID: 77 # Set ROS domain ID for all ROS2 nodes
    privileged: true # Needed for some gpu configurations.
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix # x server related
      - ~/.Xauthority:/root/.Xauthority # x server related
    network_mode: "host" 
    ipc: "host"
    command: /bin/bash -c "
      sleep 3; 
      source /opt/ros/jazzy/setup.bash;
      cd /app/software/ROS2/ros2_ws/ && colcon build && source install/setup.bash ;
      ros2 launch sas_coppeliasim_unitree_b1z1 sas_coppeliasim_unitree_b1z1_white_launch.py"    


  micro_ros_agent:
    image: microros/micro-ros-agent:jazzy
    network_mode: "host"  # Share host network for ROS2 communication
    command: udp4 --port 8888 -v6
    restart: unless-stopped  # Optional: auto-restart if it crashes    

  unitree_monitor:
    build:
      context: ../..  
      dockerfile: docker/sas_unitree_b1z1_rap_control_template/Dockerfile
    environment:
      DISPLAY: $DISPLAY  # x server related
      ROS_DOMAIN_ID: 77 # Set ROS domain ID for all ROS2 nodes
    privileged: true # Needed for some gpu configurations.
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix # x server related
      - ~/.Xauthority:/root/.Xauthority # x server related
    network_mode: "host" 
    ipc: "host"
    command: /bin/bash -c "
      source /opt/ros/jazzy/setup.bash;
      cd /app/software/ROS2/ros2_ws/ && colcon build && source install/setup.bash ;
      ros2 run unitree_monitor unitree_monitor"  

  sas_datalogger:
    image: murilomarinho/sas:jazzy    
    stop_signal: SIGINT
    platform: linux/amd64
    environment:
      DISPLAY: $DISPLAY # x server related
      ROS_DOMAIN_ID: 77
    privileged: true # Needed for some gpu configurations.
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix # x server related
      - ~/.Xauthority:/root/.Xauthority # x server related
    network_mode: "host" # x server related
    ipc: "host"
    command: /bin/bash -c "
      source /opt/ros/jazzy/setup.bash;
      ros2 run sas_datalogger sas_datalogger_node.py "    



